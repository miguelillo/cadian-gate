name: Release

# Publishes both packages to GitHub Packages when a v* tag is pushed.
# The tag is the single source of the version (e.g. v1.2.3 → 1.2.3).
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  nuget:
    name: Publish NuGet — Miguelillo.PatternAuth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Test
        run: dotnet test dotnet/PatternAuth.slnx --nologo
      - name: Pack
        run: dotnet pack dotnet/src/PatternAuth/PatternAuth.csproj -c Release -o out "/p:Version=${GITHUB_REF_NAME#v}"
      - name: Push
        run: dotnet nuget push out/*.nupkg --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key "${{ secrets.GITHUB_TOKEN }}"

  npm:
    name: Publish npm — @miguelillo/cadian-gate-react
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
      - run: npm install
      - run: npm test
      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - run: npm run build
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
