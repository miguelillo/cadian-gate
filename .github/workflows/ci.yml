name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dotnet:
    name: .NET — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Test
        run: dotnet test dotnet/PatternAuth.slnx --nologo

  js:
    name: JS — test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm test
      - run: npm run build
      - name: Check artifacts
        run: test -f dist/index.js && test -f dist/index.d.ts && test -f dist/styles.css
